    </filter>
    <filter id="noise" x="0" y="0" width="1440" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="heroClip">
      <path d="M276 132H1280V486H276V132Z"/>
    </clipPath>
  </defs>

