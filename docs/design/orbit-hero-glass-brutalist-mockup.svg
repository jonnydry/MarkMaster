  <text x="276" y="928" fill="#FFFFFF" fill-opacity="0.38" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Glass panel over a minimalist orbital image, hard square CTAs, no decorative blobs, and the sticky scan strip remains visible below the hero.</text>
