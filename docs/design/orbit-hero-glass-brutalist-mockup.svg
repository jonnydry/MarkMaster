    </linearGradient>
    <filter id="softGlow" x="646" y="-28" width="782" height="694" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="frost" x="248" y="118" width="1072" height="396" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
