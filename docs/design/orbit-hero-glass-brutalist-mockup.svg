<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050607"/>
      <stop offset="0.46" stop-color="#0A0E10"/>
      <stop offset="1" stop-color="#11140F"/>
    </linearGradient>
    <linearGradient id="heroGlass" x1="264" y1="138" x2="1296" y2="484" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="0.44" stop-color="#88F5FF" stop-opacity="0.075"/>
      <stop offset="1" stop-color="#C7FF5E" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="heroImage" x1="842" y1="109" x2="1266" y2="492" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDFEFF" stop-opacity="0.42"/>
      <stop offset="0.43" stop-color="#78F0FF" stop-opacity="0.12"/>
      <stop offset="0.74" stop-color="#D7FF69" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#030506" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hardPanel" x1="304" y1="366" x2="718" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FFFE" stop-opacity="0.18"/>
