<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050607"/>
      <stop offset="0.42" stop-color="#090D0E"/>
      <stop offset="0.82" stop-color="#10140D"/>
      <stop offset="1" stop-color="#090A08"/>
    </linearGradient>
    <linearGradient id="field" x1="250" y1="86" x2="1395" y2="624" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="0.36" stop-color="#6EEBFF" stop-opacity="0.11"/>
      <stop offset="0.69" stop-color="#D8FF63" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeDown" x1="832" y1="74" x2="832" y2="638" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8FCFF" stop-opacity="0.19"/>
      <stop offset="0.48" stop-color="#D8FF63" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#050607" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glassRail" x1="276" y1="493" x2="1280" y2="589" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="0.53" stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="1" stop-color="#D8FF63" stop-opacity="0.075"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="1440" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <filter id="softLine" x="216" y="-28" width="1282" height="752" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.7"/>
    </filter>
    <clipPath id="contentClip">
      <rect x="224" y="76" width="1216" height="884"/>
    </clipPath>
  </defs>

  <rect width="1440" height="960" fill="url(#page)"/>
  <rect width="1440" height="960" filter="url(#grain)" opacity="0.42"/>

  <!-- Persistent app rail -->
  <rect x="0" y="0" width="224" height="960" fill="#050607"/>
  <rect x="223" y="0" width="1" height="960" fill="#FFFFFF" opacity="0.10"/>
  <rect x="24" y="28" width="42" height="42" rx="10" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.16"/>
  <path d="M39 49C44 38 57 40 55 51C54 60 43 62 38 55" stroke="#D8FF63" stroke-width="2.2" stroke-linecap="square"/>
  <text x="78" y="54" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="740">MarkMaster</text>
  <text x="24" y="116" fill="#FFFFFF" fill-opacity="0.38" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" letter-spacing="2">LIBRARY</text>
  <rect x="18" y="178" width="188" height="42" rx="12" fill="#D8FF63" fill-opacity="0.13" stroke="#D8FF63" stroke-opacity="0.36"/>
  <text x="56" y="204" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="660">Orbit</text>
  <circle cx="36" cy="199" r="8" stroke="#D8FF63" stroke-width="1.6"/>
  <path d="M28 199H44" stroke="#D8FF63" stroke-width="1.2"/>
  <g fill="#F8FFFE" fill-opacity="0.44" font-family="Inter, ui-sans-serif, system-ui" font-size="14">
    <text x="56" y="156">Dashboard</text>
    <text x="56" y="252">Collections</text>
    <text x="56" y="300">Analytics</text>
    <text x="56" y="348">Settings</text>
  </g>
  <g stroke="#F8FFFE" stroke-opacity="0.28" stroke-width="1.4">
    <rect x="30" y="142" width="13" height="13" rx="2"/>
    <path d="M31 242H43M31 248H43M31 254H39"/>
    <path d="M31 290L37 284L43 292M31 300H43"/>
    <circle cx="37" cy="342" r="7"/>
  </g>

  <!-- Top chrome -->
  <rect x="224" y="0" width="1216" height="76" fill="#050607" fill-opacity="0.78"/>
  <rect x="224" y="75" width="1216" height="1" fill="#FFFFFF" opacity="0.09"/>
  <text x="276" y="46" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="760">Orbit</text>
  <text x="350" y="46" fill="#FFFFFF" fill-opacity="0.44" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Triage the bookmarks still circling your library.</text>
  <rect x="1210" y="24" width="154" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <circle cx="1228" cy="40" r="8" fill="#D8FF63"/>
  <text x="1244" y="45" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="600">Jonny</text>

  <g clip-path="url(#contentClip)">
    <!-- Integrated orbital background, not a hero card -->
    <rect x="224" y="76" width="1216" height="520" fill="url(#field)"/>
    <rect x="224" y="76" width="1216" height="520" fill="url(#fadeDown)"/>
    <path d="M224 595C447 532 718 517 955 550C1158 578 1302 641 1440 728V960H224V595Z" fill="#050607" fill-opacity="0.42"/>
    <path d="M250 286C515 162 892 142 1260 230C1320 244 1380 263 1440 286" stroke="#F8FFFE" stroke-opacity="0.10" stroke-width="50" stroke-linecap="square"/>
    <path d="M228 415C553 518 934 496 1288 351C1341 329 1392 305 1440 278" stroke="#D8FF63" stroke-opacity="0.065" stroke-width="58" stroke-linecap="square"/>
    <g filter="url(#softLine)">
      <ellipse cx="1032" cy="312" rx="356" ry="103" transform="rotate(-17 1032 312)" stroke="#F8FFFE" stroke-opacity="0.28" stroke-width="1.2"/>
      <ellipse cx="1014" cy="316" rx="278" ry="78" transform="rotate(13 1014 316)" stroke="#82F3FF" stroke-opacity="0.24" stroke-width="1"/>
      <ellipse cx="1018" cy="316" rx="180" ry="50" transform="rotate(-38 1018 316)" stroke="#D8FF63" stroke-opacity="0.31" stroke-width="1"/>
      <ellipse cx="1018" cy="316" rx="470" ry="136" transform="rotate(-4 1018 316)" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    </g>
    <circle cx="1016" cy="318" r="4" fill="#D8FF63"/>
    <circle cx="1016" cy="318" r="43" fill="#F8FFFE" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <rect x="244" y="236" width="1036" height="1" fill="#FFFFFF" opacity="0.08"/>
    <rect x="244" y="432" width="1036" height="1" fill="#FFFFFF" opacity="0.07"/>
    <rect x="1150" y="174" width="210" height="1" fill="#FFFFFF" opacity="0.18"/>
    <rect x="1104" y="198" width="128" height="1" fill="#D8FF63" opacity="0.27"/>
    <rect x="818" y="458" width="190" height="1" fill="#82F3FF" opacity="0.17"/>

    <!-- Copy is directly on the page field -->
    <text x="276" y="170" fill="#D8FF63" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" letter-spacing="2.7">ORBIT / DEFAULT MODE</text>
    <text x="276" y="246" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="70" font-weight="830" letter-spacing="-2.6">Make the next</text>
    <text x="276" y="322" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="70" font-weight="830" letter-spacing="-2.6">move obvious.</text>
    <text x="280" y="366" fill="#FFFFFF" fill-opacity="0.70" font-family="Inter, ui-sans-serif, system-ui" font-size="17">Grok scans the visible queue or your selected bookmarks, then</text>
    <text x="280" y="391" fill="#FFFFFF" fill-opacity="0.70" font-family="Inter, ui-sans-serif, system-ui" font-size="17">you review every proposed tag and collection move before apply.</text>

    <!-- Brutalist actions embedded in the field -->
    <rect x="276" y="430" width="218" height="44" rx="0" fill="#F8FFFE"/>
    <path d="M295 453L302 446L309 453" stroke="#050607" stroke-width="1.8" stroke-linecap="square"/>
    <text x="322" y="458" fill="#050607" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="780">Auto-categorize queue</text>
    <rect x="512" y="430" width="152" height="44" rx="0" fill="#FFFFFF" fill-opacity="0.045" stroke="#FFFFFF" stroke-opacity="0.20"/>
    <circle cx="536" cy="452" r="8" stroke="#82F3FF" stroke-width="1.6"/>
    <text x="556" y="458" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="680">Open graph</text>
    <rect x="682" y="430" width="120" height="44" rx="0" fill="#050607" fill-opacity="0.30" stroke="#D8FF63" stroke-opacity="0.26"/>
    <text x="714" y="458" fill="#D8FF63" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">Select</text>

    <!-- Embedded scan scope, floating but not card-framed -->
    <g opacity="0.95">
      <path d="M936 374H1208V443H936V374Z" fill="#050607" fill-opacity="0.26"/>
      <path d="M936 374H1208M936 443H1208M936 374V443M1208 374V443" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="960" y="401" fill="#FFFFFF" fill-opacity="0.52" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" letter-spacing="2.4">SCAN SCOPE</text>
      <text x="960" y="429" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="780">12 visible bookmarks</text>
      <rect x="1162" y="392" width="50" height="20" rx="10" fill="#D8FF63" fill-opacity="0.13" stroke="#D8FF63" stroke-opacity="0.30"/>
      <text x="1174" y="406" fill="#D8FF63" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9">LIVE</text>
    </g>

    <!-- Sticky strip, still part of page flow -->
    <rect x="276" y="518" width="1004" height="74" rx="18" fill="#050607" fill-opacity="0.66" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <rect x="276" y="518" width="1004" height="74" rx="18" fill="url(#glassRail)"/>
    <rect x="304" y="539" width="176" height="34" rx="17" fill="#F8FFFE"/>
    <text x="338" y="561" fill="#050607" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="750">Review and apply</text>
    <text x="516" y="549" fill="#82F3FF" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" letter-spacing="2.3">SCANNED</text>
    <text x="516" y="569" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="14">12 bookmarks · 12 left to review</text>
    <rect x="910" y="540" width="76" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.055" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="934" y="561" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Scan</text>
    <rect x="1004" y="540" width="98" height="32" rx="16" fill="#D8FF63" fill-opacity="0.12" stroke="#D8FF63" stroke-opacity="0.24"/>
    <text x="1030" y="561" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Decide</text>
    <rect x="1120" y="540" width="84" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="1144" y="561" fill="#FFFFFF" fill-opacity="0.68" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Apply</text>

    <!-- Below content preview, quieter and subordinate -->
    <rect x="276" y="644" width="1004" height="106" rx="18" fill="#070A0B" fill-opacity="0.70" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="304" y="676" fill="#FFFFFF" fill-opacity="0.42" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" letter-spacing="2">RECENT PASS</text>
    <text x="304" y="704" fill="#F8FFFE" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="710">Freshest bookmarks still in orbit</text>
    <rect x="304" y="724" width="360" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="276" y="784" width="1004" height="86" rx="18" fill="#070A0B" fill-opacity="0.50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <rect x="304" y="809" width="44" height="44" rx="12" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="372" y="814" width="260" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.12"/>
    <rect x="372" y="836" width="548" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.075"/>
    <rect x="1080" y="808" width="154" height="38" rx="0" fill="#FFFFFF" fill-opacity="0.045" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="1124" y="832" fill="#FFFFFF" fill-opacity="0.68" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Review</text>
  </g>

  <text x="276" y="920" fill="#FFFFFF" fill-opacity="0.42" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" letter-spacing="1.8">REVISION</text>
  <text x="276" y="942" fill="#FFFFFF" fill-opacity="0.36" font-family="Inter, ui-sans-serif, system-ui" font-size="13">No hero card: the orbital image is the page background, with copy and actions embedded directly in the app surface.</text>
</svg>
