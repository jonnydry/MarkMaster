services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: markmaster
    volumes:
      - markmaster_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d markmaster"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  markmaster_pgdata:
